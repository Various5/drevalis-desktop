# Alembic configuration for Drevalis
#
# The database URL is read from the DATABASE_URL environment variable
# (see migrations/env.py).  The value below is a fallback for local dev only.

[alembic]
script_location = migrations
prepend_sys_path = .

# Fallback — overridden by env.py which reads DATABASE_URL env var.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/drevalis

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
