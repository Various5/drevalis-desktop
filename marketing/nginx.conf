server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Make absolutely sure JS/CSS get the right MIME even if the base
    # image ever drops one from /etc/nginx/mime.types.
    types {
        application/javascript  js mjs;
        text/css                css;
        application/json        json;
        image/svg+xml           svg;
        text/html               html htm;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/x-icon            ico;
        image/webp              webp;
        font/woff2              woff2;
    }
    default_type application/octet-stream;

    # Long-lived, immutable static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Installer scripts served as plain text so `curl | bash` / `iwr | iex`
    # work AND browsers display them inline for "read before running".
    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "no-cache";
        try_files /install.sh =404;
    }
    location = /install.ps1 {
        default_type text/plain;
        add_header Cache-Control "no-cache";
        try_files /install.ps1 =404;
    }

    # Clean URLs — /pricing resolves to /pricing.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=()" always;
    add_header X-Robots-Tag "index, follow" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    #
    # Content-Security-Policy — pragmatic profile for a mostly-static
    # marketing site:
    #   * script-src allows the Tailwind CDN + Google Tag Manager
    #     because those scripts are load-bearing on every page.
    #     ``'unsafe-inline'`` is still needed for the gtag bootstrap
    #     block and the PayPal toggle; move those to /assets/ in a
    #     later pass to drop it.
    #   * style-src allows inline styles because boot-intro + consent
    #     banner inject styles at runtime.
    #   * img-src allows data: for favicons + OG placeholders and the
    #     product screenshot CDN origin.
    #   * frame-ancestors 'none' blocks clickjacking / iframe-embed.
    # script-src: every inline script has either been moved to /assets/
    # or is a JSON-LD data block whose SHA-256 is whitelisted below.
    # 'unsafe-inline' is no longer needed. If you add a new inline
    # <script type="application/ld+json"> block, compute its hash with:
    #   python -c "import sys,hashlib,base64; print('sha256-'+base64.b64encode(hashlib.sha256(sys.stdin.read().encode()).digest()).decode())"
    # and append it here.
    #
    # style-src keeps 'unsafe-inline' because the marketing pages
    # carry ~40 literal ``style="..."`` attributes for per-element
    # overrides (bg-glow positions, pill padding, display-font letter-
    # spacing). Hashing every distinct value would require SHA-256s
    # embedded per-page and re-computed on every copy edit, which is
    # not worth the ergonomic hit for a site with no user-generated
    # HTML. The actual XSS risk is mitigated by: (1) script-src is
    # strict (no 'unsafe-inline' on scripts), so a CSS injection cannot
    # exfiltrate data or execute code; (2) frame-ancestors 'none'
    # blocks clickjacking; (3) the only writable content path into
    # these pages is the build-time HTML we control.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-9Fnjp28lxoQdrQksdQlZNdpZ+felUSCs83Nmz+mMVNI=' 'sha256-EgPLowYGgSlSs3XlrrOnS76OH7ghTP5tipfZh/7Ltg0=' https://cdn.tailwindcss.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://www.google-analytics.com https://drevalis.com; connect-src 'self' https://www.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://license.drevalis.com; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://license.drevalis.com" always;

    # Gzip
    gzip on;
    gzip_types
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;
    gzip_min_length 1024;
    gzip_vary on;
}
