name: "Drevalis Creator Studio — CodeQL Config"

# Use GitHub's built-in security suite as the baseline. The
# ``security-and-quality`` pack includes broader hygiene queries
# (lint-level findings) which add noise on an alpha-stage repo; stay
# on ``security-extended`` until we're closer to 1.0.
queries:
  - uses: security-extended

# Path filters apply to the entire analysis, not per-query. Keep this
# list short and well-justified — files listed here lose *all* CodeQL
# coverage, not just the false-positive query.
paths-ignore:
  - "_source-reference/**"
  - "frontend/dist/**"
  - "dist/**"
  - "build/**"
  - "tests/**"

# Query-level suppression. Each entry must explain *why* the rule is
# being disabled and *under what condition* it should come back.
query-filters:
  # ``py/path-injection`` is disabled because CodeQL's Python query
  # does not model any of the sanitizers we use as barriers:
  #   - FastAPI typed path-param parsing (UUID, int, regex-validated
  #     slug) — types not flow-tracked.
  #   - ``os.path.basename(x)`` used as the path component —
  #     not modeled as a sanitizer in this CodeQL version.
  #   - ``os.path.realpath(p) + str.startswith(base + os.sep)`` —
  #     containment check that holds at runtime but the analyzer
  #     doesn't propagate the sanitization through.
  #   - ``pathlib.Path.is_relative_to`` post-check — not modeled.
  # The flagged handlers in ``episodes/_monolith.py`` and
  # ``comfyui.py`` *are* sound (see alpha.16-.20 fix history in
  # ``CHANGELOG.md``). Re-enable this rule when the storage layout
  # is refactored to a hash-substituted path scheme that removes
  # user input from filesystem strings entirely, or when CodeQL's
  # Python data-flow library learns to model the realpath +
  # startswith pattern. Tracking issue: TODO.
  - exclude:
      id: py/path-injection
