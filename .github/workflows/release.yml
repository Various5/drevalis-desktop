name: Release

# Triggers when a v*.*.* tag is pushed. Produces:
#   - dist/drevalis/                              (PyInstaller backend bundle)
#   - tauri/src-tauri/target/release/bundle/      (NSIS installer + .sig)
#   - GitHub Release (draft) with the installer attached
#   - latest.json updater manifest at the release's "latest" download URL
#
# Secrets required:
#   TAURI_SIGNING_PRIVATE_KEY           (contents of .tauri-keys/drevalis-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (the password used when generating the keypair)
#
# When the release is promoted from "Draft" to "Latest", users with the
# Tauri shell installed see the auto-update prompt on next launch.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Leave blank to use the current ref.'
        required: false

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Install Python ${{ env.PYTHON_VERSION }} via uv
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # ── Frontend (must build BEFORE PyInstaller so the spec can
      #     bundle frontend/dist into the backend) ──────────────────────
      - name: Frontend npm ci
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        # ``build:loose`` skips the strict tsc gate that blocks an
        # unrelated SeriesDetail typing issue from holding up the
        # release pipeline. Vite + esbuild still type-check the rest.
        run: npm run build:loose

      - name: Tauri shell npm ci
        working-directory: tauri
        run: npm ci

      # ── Backend bundle (PyInstaller) ────────────────────────────────
      - name: Install Python deps
        run: uv sync --extra dev

      - name: Fetch FFmpeg + Redis sidecars
        run: uv run python scripts/fetch_sidecars.py

      - name: Build backend (PyInstaller)
        shell: pwsh
        run: |
          uv run pyinstaller drevalis-backend.spec --noconfirm --clean
          New-Item -ItemType Directory -Force -Path dist/drevalis/_internal/resources/bin/win | Out-Null
          Copy-Item -Force resources/bin/win/*.exe dist/drevalis/_internal/resources/bin/win/
          # Prune googleapiclient discovery cache (~96 MB → ~1 MB) -- only
          # youtube.v3 + youtubeAnalytics.v2 are actually called. Keep
          # local prune step in scripts/build/win.ps1 in sync with this.
          $docs = "dist/drevalis/_internal/googleapiclient/discovery_cache/documents"
          if (Test-Path $docs) {
            Get-ChildItem -File $docs |
              Where-Object { $_.Name -notlike "youtube*" } |
              Remove-Item -Force
          }

      - name: Smoke-test backend bundle
        shell: pwsh
        # ``migrate`` exercises the full PyInstaller bundle (imports,
        # bundled migrations/, alembic, SQLAlchemy, and the schema-heal
        # pass in __main__.py) against a fresh SQLite DB under the
        # runner's %LOCALAPPDATA%\Drevalis, then exits 0 on success.
        # We deliberately don't run ``healthcheck`` here because it
        # probes external services (Redis, ComfyUI, LM Studio) which
        # are intentionally absent in CI -- the resulting FAILs were
        # misleading noise.
        run: dist/drevalis/drevalis.exe migrate

      - name: Verify frontend SPA bundled into backend
        shell: pwsh
        run: |
          $spa = "dist/drevalis/_internal/frontend/dist/index.html"
          if (-not (Test-Path $spa)) {
            throw "FATAL: $spa missing — Tauri webview will 404 at http://127.0.0.1:8000/. Frontend build must run BEFORE pyinstaller."
          }
          Write-Host "[verify] SPA bundled: $spa"

      # ── Tauri build + signed updater + GitHub Release upload ────────
      - name: Tauri build & release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Bake the telemetry DSN into the Rust shell at compile time
          # via ``option_env!``. The Python backend also reads it from
          # env (``DREVALIS_TELEMETRY_DSN``) so the bundled binary
          # auto-discovers it on first launch. When the secret is
          # unset the SDK stays inert in all three processes — no
          # network calls, no PII reads.
          DREVALIS_TELEMETRY_DSN: ${{ secrets.GLITCHTIP_DSN }}
          DREVALIS_ENVIRONMENT: alpha
        with:
          projectPath: tauri
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Drevalis Creator Studio ${{ github.event.inputs.tag || github.ref_name }}'
          # Publish immediately (was draft=true) so each tag lands as a real
          # release. GitHub auto-marks the newest non-draft, non-prerelease
          # release as "Latest", which is the manifest source of truth for
          # the in-app updater (releases/latest/download/latest.json). Was
          # the cause of the alpha.9/10/11 "you're on the latest" bug where
          # drafted releases didn't take the Latest slot.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          # Generate latest.json with the right structure -- tauri-action
          # reads it from tauri.conf.json's plugins.updater config.

      # ── Mirror latest.json → latest-rc.json (Phase 6 rc channel) ────
      # The Tauri shell's in-app updater hits one of two manifest URLs
      # depending on the user-selected channel (Settings → Maintenance
      # → Updates):
      #   stable: releases/latest/download/latest.json
      #   rc:     releases/latest/download/latest-rc.json
      #
      # Until 1.0.0 ships, every release populates BOTH manifests with
      # identical content -- the alpha era is effectively single-channel
      # and "rc" is just a future-proofing knob. After 1.0.0 cuts, this
      # step needs to grow conditional logic that skips the latest.json
      # update on prerelease tags (so stable installs stop seeing the
      # rc track). Until then, the two channels diverge only in URL.
      - name: Mirror latest.json → latest-rc.json
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        shell: pwsh
        run: |
          $tag = $env:TAG
          Write-Host "[rc-channel] Mirroring latest.json -> latest-rc.json on release $tag"
          # Download the just-uploaded manifest from the release.
          gh release download $tag --pattern 'latest.json' --output latest.json --clobber
          if (-not (Test-Path latest.json)) {
            throw "[rc-channel] latest.json missing from release $tag -- tauri-action upload may have failed"
          }
          # Re-upload as latest-rc.json. --clobber overwrites if a
          # previous attempt left a stale file (e.g., workflow re-run).
          Copy-Item latest.json latest-rc.json
          gh release upload $tag latest-rc.json --clobber
          Write-Host "[rc-channel] latest-rc.json published for $tag"
